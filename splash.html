<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Welcome — DevConnect</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .splash {height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
    .splash .logo {font-size:48px;font-weight:700}
    .splash .tag {color:#666}
    .splash .spinner {width:48px;height:48px;border-radius:50%;border:4px solid #e6e6e6;border-top-color:#3b82f6;animation:spin 1s linear infinite}
    @keyframes spin {to{transform:rotate(360deg)}}
    .skip {margin-top:12px;opacity:0.85}
  ZZ</style>
</head>
<body>
  <div class="splash">
    <div class="logo" aria-hidden>
      <!-- Simple, copyright-free SVG logo (geometric) -->
      <svg width="96" height="96" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img">
        <title>DevConnect logo</title>
        <rect x="8" y="8" width="84" height="84" rx="14" fill="#3b82f6"/>
        <g transform="translate(18,22)" fill="#fff">
          <path d="M10 6 L18 6 L18 8 L10 8 Z"/>
          <path d="M10 12 L34 12 L34 14 L10 14 Z"/>
          <circle cx="6" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
        </g>
      </svg>
    </div>
    <div class="tag">DevConnect — Connect, Code, and Grow Together</div>
    <div class="spinner" aria-hidden></div>
    <div class="muted">Preparing your experience...</div>
  </div>x

  <script>
    // Show splash only on first app start. Persist `seenSplash` in localStorage.
    const DELAY = 4000; // 4 seconds
    (function(){
      try {
        const seen = localStorage.getItem('seenSplash');
        const token = localStorage.getItem('token');
        const route = token ? 'social.html' : 'register.html';
        if (seen) {
          // already shown before -> immediately route
          window.location.href = route;
          return;
        }
        // first time: show for DELAY then mark seen and route
        setTimeout(()=>{
          try { localStorage.setItem('seenSplash','1'); } catch(e){}
          window.location.href = route;
        }, DELAY);
      } catch (e) {
        window.location.href = 'register.html';
      }
    })();
  </script>
</body>
</html>
