<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Profile - DevConnect</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="nav">
      <div class="brand"><div class="logo">DevConnect</div><div class="tag">Connect, Code, and Grow Together</div></div>
      <div class="nav-actions">
        <button id="backBtn" class="btn ghost">Back</button>
      </div>
    </header>

    <main class="main single">
      <section id="profileSection" class="card">
        <!-- profile content injected -->
      </section>
      <section id="profilePosts" class="card">
        <h3>Posts</h3>
        <div id="postsList"></div>
      </section>
    </main>
  </div>

<script>
const API='http://localhost:5000/api';
const API_BASE = API.replace('/api','');
document.getElementById('backBtn').addEventListener('click', ()=>window.location.href='index.html');

async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('u');
  if (!uid) return window.location.href = 'index.html';
  const res = await fetch(API + '/users/' + uid);
  const data = await res.json();
  if (!res.ok) { alert('User not found'); return; }

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  const profile = document.getElementById('profileSection');
  const avatarHtml = data.user.avatar ? `<img src="${API_BASE + data.user.avatar}" style="width:80px;height:80px;border-radius:12px;object-fit:cover;" alt="avatar">` : `<div style="width:80px;height:80px;
  border-radius:12px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1.8rem;color:#fff;flex-shrink:0">${escapeHtml((data.user.name||'')[0]||'')}</div>`;
  
  // Build stats section - followers and following side by side
  let statsHtml = `
    <div style="display:flex;gap:40px;margin-bottom:16px;">
      <div>
        <div style="font-size:1.4rem;font-weight:700;color:var(--accent1)">${data.user.followersCount || 0}</div>
        <div class="muted" style="font-size:0.9rem">Followers</div>
      </div>
      <div>
        <div style="font-size:1.4rem;font-weight:700;color:var(--accent2)">${data.user.followingCount || 0}</div>
        <div class="muted" style="font-size:0.9rem">Following</div>
      </div>
    </div>
  `;
  
  profile.innerHTML = `
    <div>
      ${statsHtml}
      <div style="display:flex;gap:16px;">
        <div style="flex-shrink:0">
          ${avatarHtml}
        </div>
        <div style="flex:1;min-width:0;">
          <h2 style="margin:0;margin-bottom:4px">${escapeHtml(data.user.name)} <small class="muted">@${escapeHtml(data.user.username)}</small></h2>
          <p style="margin:4px 0;font-size:0.9rem" id="bioText" class="muted">${escapeHtml(data.user.bio || '')}</p>
          <p style="margin:4px 0;font-size:0.9rem" id="skillsText" class="muted">Skills: ${escapeHtml((data.user.skills || []).join(', '))}</p>
          <p style="margin:8px 0;font-size:0.9rem" id="mutualsText" class="muted">Followed by: </p>
          <div id="profileActions" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  `;
  
  // Load mutual followers' names
  if (data.user.mutuals && data.user.mutuals.length > 0) {
    const mutualsText = document.getElementById('mutualsText');
    const mutualNames = [];
    for (const mutualId of data.user.mutuals) {
      try {
        const mutualRes = await fetch(API + '/users/' + mutualId);
        const mutualData = await mutualRes.json();
        if (mutualRes.ok && mutualData.user) {
          mutualNames.push(escapeHtml(mutualData.user.name || 'User'));
        }
      } catch (e) { console.error('Error loading mutual:', e); }
    }
    if (mutualNames.length > 0) {
      mutualsText.textContent = 'Followed by: ' + mutualNames.join(', ');
    }
  }

  const list = document.getElementById('postsList');
  
  // Add create post option if viewing own profile
  const currentUserId = localStorage.getItem('userId');
  if (currentUserId === uid) {
    list.innerHTML = `
      <div class="card new-post" style="background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:12px;border-radius:var(--radius);
      border:1px solid rgba(255,255,255,0.03);margin-bottom:16px;">
        <h4>Create a Post</h4>
        <textarea id="profilePostContent" placeholder="What's on your mind?" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
        background:rgba(255,255,255,0.02);color:#e6eef6;margin-top:8px;min-height:80px;resize:vertical;outline:none"></textarea>
        <div class="file-input-wrapper" style="margin-top:8px;"><input type="file" id="profilePostFile" accept="image/*,video/*" style="cursor:pointer;" /></div>
        <div class="post-actions" style="margin-top:8px;"><button id="profilePostBtn" class="btn primary">Post</button></div>
      </div>
    `;
    
    // Wire up profile post creation
    document.getElementById('profilePostBtn').addEventListener('click', async () => {
      const content = document.getElementById('profilePostContent').value.trim();
      const fileInput = document.getElementById('profilePostFile');
      const file = fileInput && fileInput.files && fileInput.files[0];
      if (!content && !file) { alert('Please enter content or select a file'); return; }
      
      const token = localStorage.getItem('token');
      if (!token) { alert('Please log in'); return; }
      
      try {
        let res;
        if (file) {
          const fd = new FormData();
          fd.append('file', file);
          fd.append('content', content);
          res = await fetch(API + '/posts', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
        } else {
          res = await fetch(API + '/posts', {
            method: 'POST',
            headers: Object.assign({'Content-Type':'application/json'}, { Authorization: 'Bearer ' + token }),
            body: JSON.stringify({ content })
          });
        }
        if (!res.ok) throw new Error('Post creation failed');
        document.getElementById('profilePostContent').value = '';
        fileInput.value = '';
        loadProfile(); // Reload to show new post
      } catch (e) { alert('Failed to create post: ' + e.message); }
    });
  }
  
  if (Array.isArray(data.posts) && data.posts.length) {
    list.innerHTML += '';
    data.posts.forEach(p => {
      let media = '';
      if (p.file) {
        const lower = p.file.toLowerCase();
        if (lower.endsWith('.mp4') || lower.endsWith('.webm') || lower.endsWith('.ogg')) {
          media = `<div class="post-media"><video controls src="${API_BASE + p.file}" style="max-width:100%"></video></div>`;
        } else {
          media = `<div class="post-media"><img src="${API_BASE + p.file}" style="max-width:100%" onerror="this.style.display='none'"/></div>`;
        }
      }
      let commentsHtml = '';
      if (Array.isArray(p.comments) && p.comments.length) {
        // prefer display name attached by API (c.user), fall back to userId
        commentsHtml = '<div class="comments">' + p.comments.map(c => `<div class="comment"><strong class="muted">${escapeHtml(c.user || c.userId || 'User')}:</strong> ${escapeHtml(c.text || c.comment || '')}
          </div>`).join('') + '</div>';
      }
      const postHtml = `
        <div class="post-summary">
          <div>${escapeHtml(p.content || '')}</div>
          ${media}
          <div class="muted">Likes: ${p.likes||0}</div>
          ${commentsHtml}
          <div class="add-comment">
            <button class="openCommentBtn btn ghost" data-id="${p.id || p._id}">Write a comment</button>
            <div class="commentBox" style="display:none;margin-top:8px">
              <textarea class="commentInput" data-id="${p.id || p._id}" placeholder="Write a comment..." rows="2" style="width:100%"></textarea>
              <div style="margin-top:6px"><button class="commentBtn btn" data-id="${p.id || p._id}">Comment</button></div>
            </div>
          </div>
        </div>`;
      list.insertAdjacentHTML('beforeend', postHtml);
    });
    // attach comment handlers (allow any logged-in user to comment)
    document.querySelectorAll('.commentBtn').forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const ta = document.querySelector(`.commentInput[data-id="${id}"]`);
      const text = ta && ta.value.trim();
      if (!text) return alert('Enter a comment');
      const token = localStorage.getItem('token');
      if (!token) return alert('Please log in to comment');
      try {
        const res = await fetch(API + '/posts/' + id + '/comment', { method: 'POST', headers: Object.assign({'Content-Type':'application/json'}, { Authorization: 'Bearer ' + token }), body: JSON.stringify({ comment: text }) });
        const j = await res.json();
        if (!res.ok) return alert(j.message || 'Comment failed');
        ta.value = '';
        // reload profile posts
        loadProfile();
      } catch (e) { alert('Comment failed'); }
    }));
    // attach open/toggle handlers for comment boxes
    document.querySelectorAll('.openCommentBtn').forEach(b => b.addEventListener('click', (e) => {
      const id = b.dataset.id;
      const box = b.nextElementSibling;
      if (!box) return;
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
      if (box.style.display === 'block') { const ta = box.querySelector('.commentInput'); if (ta) ta.focus(); }
    }));
  } else list.innerHTML = '<p class="muted">No posts yet.</p>';

  // if this is the logged-in user's profile, show upload control
  const token = localStorage.getItem('token');
  if (token) {
    try {
      const meRes = await fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      if (meRes.ok) {
        const meData = await meRes.json();
        if (meData.user && String(meData.user.id) === String(uid)) {
          const editControls = `
            <div style="margin-top:12px">
              <div style="display:flex;align-items:center;gap:8px;">
                <button id="editProfileBtn" class="btn">Edit Profile</button>
                <button id="quickPostBtn" class="btn primary" title="Quick Post" style="padding:6px 10px;border-radius:8px;font-size:18px;line-height:1">+</button>
              </div>
              <div id="editForm" style="display:none;margin-top:12px">
                <label>Name:</label>
                <input id="nameInput" value="${escapeHtml(data.user.name||'')}" />
                <label style="margin-top:8px">Update profile photo:</label>
                <input type="file" id="avatarFile" accept="image/*" />
                <button id="uploadAvatar" class="btn">Upload</button>
                <div id="uploadMsg" class="muted"></div>
                <label style="margin-top:8px">Edit bio:</label>
                <textarea id="bioInput" rows="3" placeholder="Tell the community about yourself">${escapeHtml(data.user.bio||'')}</textarea>
                <label style="margin-top:8px">Skills (comma separated):</label>
                <input id="skillsInput" placeholder="js, node, react" value="${escapeHtml((data.user.skills||[]).join(', '))}" />
                <div style="margin-top:8px"><button id="saveProfile" class="btn">Save Profile</button><span id="saveMsg" class="muted"></span></div>
              </div>
            </div>`;
          profile.insertAdjacentHTML('beforeend', editControls);
          document.getElementById('editProfileBtn').addEventListener('click', ()=>{
            const f = document.getElementById('editForm');
            f.style.display = (f.style.display === 'none') ? 'block' : 'none';
          });
          document.getElementById('uploadAvatar').addEventListener('click', async () => {
            const f = document.getElementById('avatarFile').files[0];
            if (!f) return alert('Select a file');
            const fd = new FormData(); fd.append('avatar', f);
            const upl = await fetch(API + '/users/' + uid + '/avatar', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
            const j = await upl.json();
            const msg = document.getElementById('uploadMsg');
            if (!upl.ok) return msg.textContent = j.message || 'Upload failed';
            msg.textContent = 'Uploaded';
            // refresh avatar image in header
            const img = profile.querySelector('img.avatar-large');
            if (img) img.src = API_BASE + j.avatar + '?t=' + Date.now();
          });
          document.getElementById('saveProfile').addEventListener('click', async () => {
            const bio = document.getElementById('bioInput').value;
            const skills = (document.getElementById('skillsInput').value || '').split(',').map(s=>s.trim()).filter(Boolean);
            const name = document.getElementById('nameInput').value || '';
            const res = await fetch(API + '/users/' + uid, { method: 'PUT', headers: Object.assign({'Content-Type':'application/json'}, { Authorization: 'Bearer ' + token }), body: JSON.stringify({ name, bio, skills }) });
            const j = await res.json();
            const sm = document.getElementById('saveMsg');
            if (!res.ok) return sm.textContent = j.message || 'Save failed';
            sm.textContent = 'Saved';
            // update displayed name, bio & skills
            const nameEl = profile.querySelector('h2'); if (nameEl) nameEl.childNodes[0].textContent = name + ' ';
            const bioText = document.getElementById('bioText'); if (bioText) bioText.textContent = bio;
            const skillsText = document.getElementById('skillsText'); if (skillsText) skillsText.textContent = 'Skills: ' + skills.join(', ');
            // if avatar returned, update avatar too
            if (j.user && j.user.avatar) {
              const img = profile.querySelector('img.avatar-large'); if (img) img.src = API_BASE + j.user.avatar + '?t=' + Date.now();
            }
          });
          // quick post button focuses the create-post box
          const quickBtn = document.getElementById('quickPostBtn');
          if (quickBtn) {
            quickBtn.addEventListener('click', () => {
              const postBox = document.getElementById('profilePostContent');
              if (postBox) {
                const card = document.querySelector('.card.new-post');
                if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                postBox.focus();
              } else {
                alert('Create post is available only on your profile.');
              }
            });
          }
        }
        else {
          // show follow/unfollow button for other users
          const isFollowing = Array.isArray(meData.user.following) && meData.user.following.includes(uid);
          const actionHtml = `
            <div style="margin-top:8px">
              <button id="followBtn" class="btn">${isFollowing ? 'Following' : 'Follow'}</button>
              <button id="messageUserBtn" class="btn ghost">Message</button>
              <span id="followMsg" class="muted" style="margin-left:8px"></span>
            </div>`;
          const actionsEl = profile.querySelector('#profileActions') || profile;
          actionsEl.insertAdjacentHTML('beforeend', actionHtml);
          document.getElementById('messageUserBtn').addEventListener('click', ()=>{
            window.location.href = 'chat.html?u=' + uid;
          });
          document.getElementById('followBtn').addEventListener('click', async () => {
            const btn = document.getElementById('followBtn');
            const action = btn.textContent === 'Follow' ? 'follow' : 'unfollow';
            const res = await fetch(API + '/users/' + uid + '/' + action, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
            const j = await res.json();
            const fm = document.getElementById('followMsg');
            if (!res.ok) return fm.textContent = j.message || 'Failed';
            if (action === 'follow') { btn.textContent = 'Following'; fm.textContent = 'Following'; } else { btn.textContent = 'Follow'; fm.textContent = 'Unfollowed'; }
            try { localStorage.setItem('followingChanged', Date.now()); } catch(e) {}
          });
        }
      }
    } catch (e) { /* ignore */ }
  }
}
loadProfile();
</script>
</body>
</html>
